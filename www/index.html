<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sổ Chốt Đơn - Võ Tấn Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-deep: #050505;
            --surface: rgba(15, 15, 15, 0.98);
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-main: #d4af37; 
            --text-bright: #ffffff;
            --active-blue: #3b82f6; 
            --danger: #ff4d4d;
            --paid-green: #10b981;
            --paid-bg: rgba(16, 185, 129, 0.15);
            --grid-line: 0.8px solid rgba(212, 175, 55, 0.35); 
            --unified-font: 13px; 
        }
        html, body { overscroll-behavior: none !important; overscroll-behavior-y: none !important; height: 100%; width: 100%; position: fixed; overflow: hidden; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-deep); color: var(--text-bright); }
        .streak { position: fixed; width: 140vw; height: 450px; background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0, 0, 0, 0) 75%); transform: rotate(-30deg); z-index: 0; pointer-events: none; filter: blur(85px); }
        .app-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 1; }
        .header { text-align: center; padding: 20px 10px 10px 10px; border-bottom: var(--grid-line); background: #000; flex-shrink: 0; }
        .header-title { font-size: 1.3rem; font-weight: 900; text-transform: uppercase; color: var(--gold-main); letter-spacing: 4px; }
        .made-by { font-size: 0.6rem; color: var(--gold-main); letter-spacing: 5px; text-transform: uppercase; font-weight: 900; margin-top: 5px; opacity: 0.6; }
        .control-panel { position: relative; z-index: 3000; width: 100%; max-width: 500px; margin: 10px auto; padding: 0 10px; flex-shrink: 0; }
        .primary-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn-main { flex: 1; height: 45px; background: var(--gold-gradient); color: #000; border: none; border-radius: 12px; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; cursor: pointer; }
        .action-row { display: flex; gap: 8px; margin-bottom: 0; }
        .btn-capture-main { flex: 2; height: 38px; background: #111; border: 1.5px solid var(--gold-main); border-radius: 10px; color: var(--gold-main); font-weight: 700; font-size: 0.72rem; display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer; text-transform: uppercase; }
        .btn-reset-main { flex: 1; height: 38px; background: #0a0a0a; border: 1.5px solid #331111; border-radius: 10px; color: #555; font-weight: 700; font-size: 0.68rem; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; text-transform: uppercase; }
        .table-container { background: var(--surface); overflow: auto; flex-grow: 1; border-top: var(--grid-line); -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { border-bottom: var(--grid-line); border-right: var(--grid-line); padding: 10px 4px; text-align: center; }
        thead th { position: sticky; top: 0; z-index: 1000; background-color: #000 !important; color: #ffffff; font-weight: 900; font-size: 0.65rem; }
        thead th.sticky-col, thead th.total-cell { font-size: 0.8rem !important; font-weight: 900 !important; letter-spacing: 1px; background-color: #000 !important; color: var(--gold-main) !important; }
        .sticky-col { position: sticky; left: 0; z-index: 1500; background-color: #080808 !important; color: #fff; font-weight: 500; min-width: 90px; text-align: left; padding-left: 10px; font-size: var(--unified-font); border-right: var(--grid-line) !important; }
        .total-cell { position: sticky; right: 0; z-index: 1500; background-color: #0c0c0c !important; color: var(--danger); font-weight: 800; font-size: 13px; min-width: 80px; border-left: var(--grid-line) !important; }
        thead th.sticky-col { z-index: 2500 !important; top: 0; left: 0; }
        thead th.total-cell { z-index: 2500 !important; top: 0; right: 0; }
        .table-container input { width: 35px; height: 35px; border: 1px solid transparent; border-radius: 50%; font-size: var(--unified-font); font-weight: 700; color: #555; background: transparent; text-align: center; }
        .table-container input.has-data { color: var(--active-blue) !important; border-color: var(--gold-main) !important; }
        .row-paid .sticky-col { color: var(--paid-green) !important; }
        .row-paid .total-cell { background-color: var(--paid-green) !important; color: #000 !important; cursor: pointer; }
        .row-paid td { background-color: var(--paid-bg) !important; }
        tfoot { position: sticky; bottom: 0; z-index: 2000; }
        .grand-total-row td { background-color: #0a0a0a !important; font-weight: 900 !important; color: var(--gold-main); font-size: 14px !important; height: 50px; border-top: var(--grid-line) !important; }
        tfoot td.sticky-col { color: var(--gold-main) !important; font-weight: 900 !important; font-size: 0.8rem !important; letter-spacing: 1px; }
        .grand-total-val { position: sticky; right: 0; z-index: 2600; background-color: #0a0a0a !important; border-left: var(--grid-line) !important; text-align: right; padding-right: 15px !important; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 0 15px; }
        .modal-box { background: #111; padding: 25px; border-radius: 20px; width: 100%; max-width: 360px; border: 0.8px solid var(--gold-main); }
        .modal-title { color: #fff; text-align: center; margin-bottom: 20px; text-transform: uppercase; font-size: 0.8rem; font-weight: 900; letter-spacing: 2px; }
        .modal-input { width: 100% !important; height: 44px !important; padding: 0 12px !important; margin-bottom: 12px !important; background: #000 !important; border: 0.8px solid #222 !important; color: var(--gold-main) !important; border-radius: 10px !important; font-size: 0.75rem !important; text-align: center !important; outline: none !important; text-transform: uppercase !important; display: block !important; }
        .modal-input::placeholder { font-size: 0.7rem; opacity: 0.35; letter-spacing: 1px; }
        .btn-confirm { background: var(--gold-gradient); color: #000; width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 0.85rem; }
        .btn-cancel { color: #555; text-align: center; margin-top: 15px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        /* CLEAN MODE */
        #cleanOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 8000; display: none; flex-direction: column; touch-action: none; }
        .clean-header { padding: 15px 10px; text-align: center; background: #000; border-bottom: 1.5px solid var(--gold-main); flex-shrink: 0; height: 70px; }
        .clean-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; padding: 15px; background: rgba(0,0,0,0.9); display: flex; gap: 10px; align-items: center; border-top: 1px solid #222; }
        .clean-content { position: absolute; top: 70px; bottom: 80px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #000; }
        #cleanWrapper { width: max-content; height: max-content; transform-origin: center center; background: #050505; }
        #cleanView table { width: max-content; border: 0.8px solid var(--gold-main); table-layout: auto; }
        #cleanView th, #cleanView td, #cleanView thead, #cleanView tfoot, #cleanView tr { position: static !important; z-index: auto !important; }
        #cleanView th, #cleanView td { padding: 6px 4px; font-size: 0.7rem; border: 0.8px solid rgba(212, 175, 55, 0.2); }
        #cleanView thead th { color: #ffffff; }
        #cleanView .total-cell { border-left: 0.8px solid rgba(212, 175, 55, 0.2) !important; color: var(--danger) !important; font-weight: 800 !important; font-size: 13px !important; }
        #cleanView tfoot td { font-size: 14px !important; font-weight: 900 !important; }
        #cleanView thead th.sticky-col, #cleanView tfoot td.sticky-col { color: var(--gold-main) !important; font-size: 0.8rem !important; font-weight: 900 !important; }
        #cleanView .sticky-col { border-right: 0.8px solid rgba(212, 175, 55, 0.2) !important; text-align: left; padding-left: 8px; font-weight: 500; color: #fff; font-size: var(--unified-font); }
        .btn-exit { flex: 1; height: 45px; background: #222; color: #fff; border-radius: 12px; font-weight: 900; border: none; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; }

        /* NÚT LƯU ẢNH */
        .btn-save-img { flex: 1.5; height: 45px; background: var(--gold-gradient); color: #000; border-radius: 12px; font-weight: 900; border: none; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* LOADING */
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid #222; border-top-color: var(--gold-main); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--gold-main); font-size: 0.8rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }

        #notifyBox { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold-gradient); color: #000; padding: 10px 20px; border-radius: 30px; font-weight: 900; display: none; z-index: 9999; font-size: 0.75rem; white-space: nowrap; }
        .editable { cursor: pointer; }

        /* ===== FIX: CAPTURE TARGET - dùng opacity thay vì top:-9999px ===== */
        /* top:-9999px khiến Android WebView không render đủ các cột hàng hoá */
        #captureTarget { position: fixed; top: 0; left: 0; opacity: 0; pointer-events: none; z-index: -1; background: #050505; display: none; }

        #captureTarget table { border-collapse: separate; border-spacing: 0; border: 1px solid rgba(212,175,55,0.5); }
        #captureTarget th, #captureTarget td { border: 0.8px solid rgba(212,175,55,0.25); padding: 10px 8px; text-align: center; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        #captureTarget .cap-header-wrap { background: #000; padding: 18px 20px 14px; text-align: center; border-bottom: 1.5px solid #d4af37; }
        #captureTarget .cap-title { color: #d4af37; font-size: 18px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        #captureTarget .cap-subtitle { color: #d4af37; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.6; margin-top: 4px; }
        #captureTarget .cap-date { color: #666; font-size: 9px; letter-spacing: 2px; margin-top: 4px; }
        #captureTarget thead th { background: #000 !important; color: #fff; font-weight: 900; font-size: 10px; }
        #captureTarget thead th.cap-name-col, #captureTarget thead th.cap-total-col { color: #d4af37 !important; font-size: 12px; letter-spacing: 1px; }
        #captureTarget .cap-name-col { background: #080808 !important; color: #fff; font-weight: 500; text-align: left; padding-left: 14px; font-size: 13px; min-width: 100px; border-right: 0.8px solid rgba(212,175,55,0.35) !important; }
        #captureTarget .cap-total-col { background: #0c0c0c !important; color: #ff4d4d; font-weight: 800; font-size: 13px; min-width: 90px; border-left: 0.8px solid rgba(212,175,55,0.35) !important; }
        #captureTarget .cap-paid-row .cap-name-col { color: #10b981 !important; }
        #captureTarget .cap-paid-row td { background: rgba(16,185,129,0.1) !important; }
        #captureTarget .cap-paid-row .cap-total-col { background: #10b981 !important; color: #000 !important; }
        #captureTarget tfoot td { background: #0a0a0a !important; color: #d4af37; font-weight: 900; font-size: 14px; height: 46px; border-top: 0.8px solid rgba(212,175,55,0.35) !important; }
        #captureTarget tfoot td.cap-name-col { color: #d4af37 !important; font-size: 12px; letter-spacing: 1px; }
        #captureTarget tfoot td.cap-total-col { text-align: right; padding-right: 14px; color: #d4af37; }
        #captureTarget .cap-qty-cell { font-size: 12px; font-weight: 700; color: #3b82f6; }
        #captureTarget .cap-zero-cell { color: #333; font-size: 11px; }
        #captureTarget .cap-footer-bar { background: #000; padding: 10px 20px; text-align: center; border-top: 1px solid #111; color: #333; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">
    <div id="notifyBox">Thông báo</div>

    <div id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Đang xuất ảnh...</div>
    </div>

    <div id="captureTarget"></div>

    <div class="app-container" id="mainApp">
        <div class="streak"></div>
        <div class="header">
            <h2 class="header-title">SỔ CHỐT ĐƠN</h2>
            <div class="made-by">— MADE BY VÕ TẤN —</div>
        </div>
        <div class="control-panel">
            <div class="action-row">
                <button class="btn-capture-main" onclick="enterCleanMode()">
                    <svg style="width:15px;height:15px;" viewBox="0 0 24 24"><path fill="currentColor" d="M4,4H7L9,2H15L17,4H20A2,2 0 0,1 22,6V18A2,2 0 0,1 20,20H4A2,2 0 0,1 2,18V6A2,2 0 0,1 4,4M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9Z"/></svg>
                    CHỤP ĐƠN HÀNG
                </button>
                <button class="btn-reset-main" onclick="openModal('modalReset')">
                    <svg style="width:13px;height:13px;" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
                    DỌN DẸP
                </button>
            </div>
            <div class="primary-row">
                <button class="btn-main" onclick="openModal('modalKhach')">👤 + KHÁCH</button>
                <button class="btn-main" onclick="openModal('modalHang')">📦 + HÀNG</button>
            </div>
        </div>
        <div class="table-container" id="scrollContainer">
            <table id="orderTable">
                <thead><tr id="headerRow"></tr></thead>
                <tbody id="bodyRows"></tbody>
                <tfoot id="footerTotal"></tfoot>
            </table>
        </div>
    </div>

    <!-- CLEAN MODE -->
    <div id="cleanOverlay">
        <div class="clean-header">
            <div style="color:var(--gold-main);font-weight:900;font-size:1rem;letter-spacing:4px;text-transform:uppercase;">ĐƠN HÀNG - VÕ TẤN</div>
        </div>
        <div class="clean-content" id="cleanContentArea">
            <div id="cleanWrapper"><div id="cleanView"></div></div>
        </div>
        <div class="clean-footer">
            <button class="btn-exit" onclick="exitCleanMode()">QUAY LẠI</button>
            <button class="btn-save-img" onclick="saveAsImage(event)">
                <svg style="width:16px;height:16px;" viewBox="0 0 24 24"><path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg>
                LƯU ẢNH
            </button>
        </div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="modalKhach">
        <div class="modal-box">
            <h3 class="modal-title" id="khachTitle">THÊM KHÁCH MỚI</h3>
            <input type="text" id="inKName" class="modal-input" placeholder="TÊN KHÁCH HÀNG..." oninput="this.value=this.value.toUpperCase()">
            <button class="btn-confirm" id="btnKhachConfirm" onclick="confirmAddK()">XÁC NHẬN</button>
            <div class="btn-cancel" onclick="closeModal('modalKhach')">QUAY LẠI</div>
        </div>
    </div>
    <div class="modal" id="modalHang">
        <div class="modal-box">
            <h3 class="modal-title" id="hangTitle">THÊM HÀNG MỚI</h3>
            <input type="text" id="inPName" class="modal-input" placeholder="TÊN HÀNG..." oninput="this.value=this.value.toUpperCase()">
            <input type="number" id="inPPrice" class="modal-input" placeholder="ĐƠN GIÁ VNĐ">
            <button class="btn-confirm" id="btnHangConfirm" onclick="confirmAddP()">THÊM MỚI</button>
            <div class="btn-cancel" onclick="closeModal('modalHang')">QUAY LẠI</div>
        </div>
    </div>
    <div class="modal" id="modalReset">
        <div class="modal-box">
            <h3 class="modal-title">XÓA TRẮNG SỔ?</h3>
            <p style="text-align:center;color:#666;font-size:0.75rem;margin-bottom:20px;">Dữ liệu sẽ biến mất vĩnh viễn.</p>
            <button class="btn-confirm" style="background:var(--danger);color:#fff;" onclick="confirmReset()">XÓA NGAY</button>
            <div class="btn-cancel" onclick="closeModal('modalReset')">HỦY BỎ</div>
        </div>
    </div>
    <div class="modal" id="modalPayConfirm">
        <div class="modal-box">
            <h3 class="modal-title" id="payModalTitle" style="color:var(--paid-green);font-size:1rem;">XÁC NHẬN CHỐT ĐƠN</h3>
            <p id="payModalDesc" style="text-align:center;color:#aaa;font-size:0.8rem;margin-bottom:25px;"></p>
            <button class="btn-confirm" id="payModalBtn" style="background:var(--paid-green);color:#000;" onclick="confirmPayAction()">ĐÃ THANH TOÁN</button>
            <div class="btn-cancel" onclick="closeModal('modalPayConfirm')">QUAY LẠI</div>
        </div>
    </div>

    <script>
        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: false });
        document.addEventListener('touchmove', e => {
            const diff = e.touches[0].clientY - touchStartY;
            const sc = document.getElementById('scrollContainer');
            if (diff > 0 && sc && sc.scrollTop <= 0) e.preventDefault();
        }, { passive: false });

        const STORAGE_KEY = 'VoTan_Precision_Master_12_6';
        let appState = { products: [{name:"HÀNG A",price:1000},{name:"HÀNG B",price:2000}], customers: [{name:"KHÁCH 01",qtys:[0,0],paid:false}] };
        let lastTap = 0, editTarget = {type:null,index:null}, targetPayIndex = null;

        function playVictoryChime() {
            try {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) return;
                const ctx = new AC(), osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(2200, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        function notify(msg, dur=2000) {
            const box = document.getElementById('notifyBox');
            box.innerText = msg; box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', dur);
        }

        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) { try { appState = JSON.parse(saved); } catch(e) {} }
            render();
        }
        function sync() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appState)); }

        function render() {
            const h = document.getElementById('headerRow'), b = document.getElementById('bodyRows'), f = document.getElementById('footerTotal');
            let hM = `<th class="sticky-col">KHÁCH HÀNG</th>`;
            appState.products.forEach((p, pi) => {
                hM += `<th class="editable" onclick="detectDoubleTap(event,'product',${pi})">${p.name}<br><span style="font-size:9.5px;opacity:0.6;font-weight:500;">${p.price.toLocaleString()}</span></th>`;
            });
            hM += `<th class="total-cell">TỔNG</th>`; h.innerHTML = hM;

            let bM = "";
            appState.customers.forEach((c, ci) => {
                let rC = `<tr class="${c.paid?'row-paid':''}"><td class="sticky-col editable" onclick="detectDoubleTap(event,'customer',${ci})">${c.name}</td>`;
                appState.products.forEach((p, pi) => {
                    const q = c.qtys[pi] || 0;
                    rC += `<td><input type="text" class="${q>0?'has-data':''}" data-ci="${ci}" data-pi="${pi}" inputmode="decimal" value="${q}" oninput="updateQty(this)" onclick="this.select()"></td>`;
                });
                rC += `<td class="total-cell" id="t-r-${ci}" onclick="initiatePay(${ci})">0</td></tr>`;
                bM += rC;
            });
            b.innerHTML = bM;

            let fM = `<tr class="grand-total-row"><td class="sticky-col">TỔNG</td>`;
            appState.products.forEach((p, pi) => { fM += `<td class="col-sum-val" id="c-s-${pi}">0</td>`; });
            fM += `<td class="grand-total-val" id="g-t">0</td></tr>`;
            f.innerHTML = fM; calc();
        }

        function updateQty(i) {
            const ci = parseInt(i.dataset.ci), pi = parseInt(i.dataset.pi), q = parseFloat(i.value) || 0;
            appState.customers[ci].qtys[pi] = q; i.classList.toggle('has-data', q > 0); sync(); calc();
        }

        function calc() {
            let colSums = new Array(appState.products.length).fill(0), grand = 0;
            appState.customers.forEach((c, ci) => {
                let rS = 0;
                appState.products.forEach((p, pi) => { const q = c.qtys[pi] || 0; colSums[pi] += q; rS += q * p.price; });
                const el = document.getElementById(`t-r-${ci}`); if (el) el.innerText = rS.toLocaleString();
                grand += rS;
            });
            colSums.forEach((s, pi) => { const el = document.getElementById(`c-s-${pi}`); if (el) el.innerText = s.toLocaleString(); });
            const gt = document.getElementById('g-t'); if (gt) gt.innerText = grand.toLocaleString();
        }

        function initiatePay(ci) {
            targetPayIndex = ci;
            const c = appState.customers[ci];
            const t = document.getElementById('payModalTitle'), d = document.getElementById('payModalDesc'), btn = document.getElementById('payModalBtn');
            if (!c.paid) {
                t.innerText = "XÁC NHẬN CHỐT ĐƠN"; t.style.color = "var(--paid-green)";
                d.innerHTML = `Khách hàng <strong style="color:#fff;">${c.name}</strong> đã thanh toán toàn bộ?`;
                btn.innerText = "ĐÃ THANH TOÁN"; btn.style.background = "var(--paid-green)"; btn.style.color = "#000";
            } else {
                t.innerText = "HỦY CHỐT ĐƠN"; t.style.color = "var(--danger)";
                d.innerHTML = `Hủy trạng thái đã chốt cho khách <strong style="color:#fff;">${c.name}</strong>?`;
                btn.innerText = "XÁC NHẬN HỦY"; btn.style.background = "var(--danger)"; btn.style.color = "#fff";
            }
            openModal('modalPayConfirm');
        }

        function confirmPayAction() {
            if (targetPayIndex !== null) {
                const was = appState.customers[targetPayIndex].paid;
                appState.customers[targetPayIndex].paid = !was;
                if (!was) playVictoryChime();
                sync(); render(); closeModal('modalPayConfirm'); targetPayIndex = null;
            }
        }

        function detectDoubleTap(e, type, index) {
            const now = Date.now();
            if (now - lastTap < 300 && now - lastTap > 0) {
                if (type === 'customer') startEditCustomer(index); else startEditProduct(index);
                e.preventDefault();
            }
            lastTap = now;
        }

        function startEditCustomer(i) {
            editTarget = {type:'customer',index:i};
            document.getElementById('khachTitle').innerText = "SỬA TÊN KHÁCH";
            document.getElementById('inKName').value = appState.customers[i].name;
            document.getElementById('btnKhachConfirm').onclick = confirmEditK;
            openModal('modalKhach');
        }
        function confirmEditK() {
            const n = document.getElementById('inKName').value.trim().toUpperCase();
            if (n) { appState.customers[editTarget.index].name = n; sync(); render(); closeModal('modalKhach'); resetKhachModal(); }
        }
        function resetKhachModal() { document.getElementById('khachTitle').innerText = "THÊM KHÁCH MỚI"; document.getElementById('inKName').value = ""; document.getElementById('btnKhachConfirm').onclick = confirmAddK; }

        function startEditProduct(i) {
            editTarget = {type:'product',index:i};
            document.getElementById('hangTitle').innerText = "SỬA TÊN & GIÁ HÀNG";
            document.getElementById('inPName').value = appState.products[i].name;
            document.getElementById('inPPrice').value = appState.products[i].price;
            document.getElementById('btnHangConfirm').onclick = confirmEditP_Action;
            openModal('modalHang');
        }
        function confirmEditP_Action() {
            const n = document.getElementById('inPName').value.trim().toUpperCase();
            const p = parseInt(document.getElementById('inPPrice').value);
            if (n && p) { appState.products[editTarget.index].name = n; appState.products[editTarget.index].price = p; sync(); render(); closeModal('modalHang'); resetHangModal(); }
        }
        function resetHangModal() { document.getElementById('hangTitle').innerText = "THÊM HÀNG MỚI"; document.getElementById('inPName').value = ""; document.getElementById('inPPrice').value = ""; document.getElementById('btnHangConfirm').onclick = confirmAddP; }

        function enterCleanMode() {
            const tableClone = document.getElementById('orderTable').cloneNode(true);
            tableClone.querySelectorAll('input').forEach(i => {
                const val = i.value, parent = i.parentNode;
                if (parseFloat(val) > 0) {
                    const div = document.createElement('div');
                    div.innerText = val;
                    div.style.cssText = "width:28px;height:28px;color:#3b82f6;border:0.8px solid #d4af37;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;margin:0 auto;line-height:1;";
                    parent.replaceChild(div, i);
                } else { parent.innerText = "-"; parent.style.color = "#333"; }
            });
            const cleanView = document.getElementById('cleanView'), cleanWrapper = document.getElementById('cleanWrapper'), contentArea = document.getElementById('cleanContentArea');
            cleanView.innerHTML = ""; cleanView.appendChild(tableClone);
            document.getElementById('cleanOverlay').style.display = 'flex';
            setTimeout(() => {
                tableClone.style.width = "max-content"; tableClone.style.display = "table";
                const tw = tableClone.offsetWidth, th = tableClone.offsetHeight;
                const sw = contentArea.clientWidth - 16, sh = contentArea.clientHeight - 16;
                let scale = Math.min(sw / tw, sh / th);
                if (scale > 1) scale = 1;
                cleanWrapper.style.transform = `scale(${scale})`;
            }, 100);
        }

        function exitCleanMode() { document.getElementById('cleanOverlay').style.display = 'none'; }

        // ==========================================
        // TÍNH NĂNG LƯU ĐƠN HÀNG THÀNH ẢNH
        // FIX: Tất cả style dùng inline để Android WebView render đầy đủ
        // ==========================================
        function buildCaptureHTML() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('vi-VN', {weekday:'long', year:'numeric', month:'2-digit', day:'2-digit'});
            const timeStr = now.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});

            let colSums = new Array(appState.products.length).fill(0), grandTotal = 0;
            const rowTotals = appState.customers.map(c => {
                let rS = 0;
                appState.products.forEach((p, pi) => { const q = c.qtys[pi]||0; colSums[pi] += q; rS += q * p.price; });
                grandTotal += rS; return rS;
            });

            let html = `<div style="background:#050505;display:inline-block;">
                <div class="cap-header-wrap">
                    <div class="cap-title">SỔ CHỐT ĐƠN</div>
                    <div class="cap-subtitle">— MADE BY VÕ TẤN —</div>
                    <div class="cap-date">${dateStr} · ${timeStr}</div>
                </div>
                <table><thead><tr>
                    <th class="cap-name-col">KHÁCH HÀNG</th>`;

            // FIX: thêm inline style đầy đủ cho cột hàng hoá, không chỉ dựa vào CSS class
            appState.products.forEach(p => {
                html += `<th style="background:#000!important;color:#ffffff;font-weight:900;font-size:10px;padding:8px 8px;text-align:center;border:0.8px solid rgba(212,175,55,0.25);">${p.name}<br><span style="font-size:8px;opacity:0.6;font-weight:500;">${p.price.toLocaleString()}</span></th>`;
            });

            html += `<th class="cap-total-col">TỔNG</th></tr></thead><tbody>`;

            appState.customers.forEach((c, ci) => {
                const isPaid = c.paid;
                const rowBg = isPaid ? 'background:rgba(16,185,129,0.1)!important;' : '';
                html += `<tr class="${isPaid?'cap-paid-row':''}">
                    <td class="cap-name-col" style="${isPaid?'color:#10b981!important;':''}">${c.name}${isPaid?' ✓':''}</td>`;

                // FIX: thêm inline style đầy đủ cho từng ô số lượng hàng hoá
                appState.products.forEach((p, pi) => {
                    const q = c.qtys[pi]||0;
                    if (q > 0) {
                        html += `<td style="font-size:12px;font-weight:700;color:#3b82f6;text-align:center;padding:8px 6px;border:0.8px solid rgba(212,175,55,0.25);${rowBg}">${q}</td>`;
                    } else {
                        html += `<td style="color:#333;font-size:11px;text-align:center;padding:8px 6px;border:0.8px solid rgba(212,175,55,0.25);${rowBg}">—</td>`;
                    }
                });

                html += `<td class="cap-total-col" style="${isPaid?'background:#10b981!important;color:#000!important;':''}">${rowTotals[ci].toLocaleString()}</td></tr>`;
            });

            html += `</tbody><tfoot><tr><td class="cap-name-col">TỔNG CỘNG</td>`;
            colSums.forEach(s => {
                html += `<td style="color:#d4af37;font-weight:900;font-size:13px;text-align:center;padding:8px 6px;background:#0a0a0a!important;border:0.8px solid rgba(212,175,55,0.25);">${s.toLocaleString()}</td>`;
            });
            html += `<td class="cap-total-col" style="color:#d4af37;">${grandTotal.toLocaleString()}</td>
                </tr></tfoot></table>
                <div class="cap-footer-bar">VÕ TẤN PRECISION · SỔ CHỐT ĐƠN</div>
            </div>`;
            return html;
        }

        function saveAsImage(event) {
            event.stopPropagation();
            const loadingEl = document.getElementById('loadingOverlay');
            loadingEl.style.display = 'flex';

            const ct = document.getElementById('captureTarget');
            ct.innerHTML = buildCaptureHTML();
            ct.style.display = 'block';

            setTimeout(() => {
                const targetEl = ct.firstElementChild;
                html2canvas(targetEl, {
                    backgroundColor: '#050505',
                    scale: 3,
                    useCORS: true,
                    logging: false,
                    allowTaint: true,
                }).then(canvas => {
                    loadingEl.style.display = 'none';
                    const now = new Date();
                    const fn = 'Don-Hang-VoTan-' + now.getFullYear() +
                        String(now.getMonth()+1).padStart(2,'0') +
                        String(now.getDate()).padStart(2,'0') + '-' +
                        String(now.getHours()).padStart(2,'0') +
                        String(now.getMinutes()).padStart(2,'0') + '.png';

                    const base64 = canvas.toDataURL('image/png');

                    // ANDROID WEBVIEW: Gọi bridge Java để lưu ảnh vào Gallery
                    if (window.AndroidSaveImage) {
                        try {
                            window.AndroidSaveImage.saveBase64Image(base64, fn);
                        } catch(e) {
                            notify('❌ Lỗi lưu ảnh: ' + e.message, 3000);
                        }
                        ct.style.display = 'none';
                        return;
                    }

                    // TRÌNH DUYỆT THƯỜNG: download link
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = fn;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                        setTimeout(() => URL.revokeObjectURL(url), 3000);
                        notify('✅ ĐÃ LƯU ẢNH THÀNH CÔNG!', 2500);
                        ct.style.display = 'none';
                    }, 'image/png');

                }).catch(err => {
                    loadingEl.style.display = 'none';
                    ct.style.display = 'none';
                    notify('❌ Lỗi xuất ảnh. Vui lòng thử lại.', 3000);
                });
            }, 200);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; targetPayIndex = null; }
        function confirmAddK() { const n = document.getElementById('inKName').value.trim().toUpperCase(); if (n) { appState.customers.push({name:n,qtys:new Array(appState.products.length).fill(0),paid:false}); sync(); render(); closeModal('modalKhach'); document.getElementById('inKName').value = ""; } }
        function confirmAddP() { const n = document.getElementById('inPName').value.trim().toUpperCase(), p = parseInt(document.getElementById('inPPrice').value); if (n && p) { appState.products.push({name:n,price:p}); appState.customers.forEach(c => c.qtys.push(0)); sync(); render(); closeModal('modalHang'); document.getElementById('inPName').value = ""; document.getElementById('inPPrice').value = ""; } }
        function confirmReset() { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        function handleGlobalClick(event) {}

        window.onload = init;
    </script>
</body>
</html>
