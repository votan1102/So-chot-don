name: Build APK - So Chot Don

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch MainActivity for image saving
        run: |
          cp android-src/MainActivity.java \
            android/app/src/main/java/com/votan/sochotdon/MainActivity.java

      - name: Add image permissions to AndroidManifest
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />|' \
            android/app/src/main/AndroidManifest.xml

      - name: Embed html2canvas locally
        run: |
          curl -s https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js \
            -o /tmp/html2canvas.min.js
          python3 - << PYEOF
          import re
          with open('www/index.html', 'r') as f:
              html = f.read()
          cdn_tag = '<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>'
          with open('/tmp/html2canvas.min.js', 'r') as f:
              h2c = f.read()
          inline_tag = '<script>' + h2c + '</script>'
          html = html.replace(cdn_tag, inline_tag)
          with open('www/index.html', 'w') as f:
              f.write(html)
          print('html2canvas embedded OK, size:', len(html))
          PYEOF

      - name: Replace app icons with custom logo
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icons/mipmap-${density}/ic_launcher.png \
              android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp icons/mipmap-${density}/ic_launcher_round.png \
              android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: So-Chot-Don-APK-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30 
