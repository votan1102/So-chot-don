name: Build APK - So Chot Don

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      # ── THAY THẾ MAINACTIVITY ĐỂ FIX LƯU ẢNH VÀO GALLERY ──
      - name: Patch MainActivity for image saving
        run: |
          cp android-src/MainActivity.java \
            android/app/src/main/java/com/votan/sochotdon/MainActivity.java

      # ── THÊM QUYỀN GHI ẢNH VÀO ANDROIDMANIFEST ──
      - name: Add WRITE_EXTERNAL_STORAGE permission
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />|' \
            android/app/src/main/AndroidManifest.xml

      # ── THAY THẾ ICON BẰNG LOGO CỦA BẠN ──
      # Phải chạy SAU cap sync và TRƯỚC khi build
      # Xóa mipmap-anydpi-v26 để Android 8+ không dùng adaptive icon mặc định của Capacitor
      - name: Replace app icons with custom logo
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icons/mipmap-${density}/ic_launcher.png \
              android/app/src/main/res/mipmap-${density}/ic_launcher.png
            cp icons/mipmap-${density}/ic_launcher_round.png \
              android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: So-Chot-Don-APK-v1
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
